# Local development convenience - mirrors the CI topology (app + Postgres).
# Not used by the pipeline; provided so a reader can run the reference locally.
version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: widgets
    ports:
      - "5432:5432"
  app:
    build: .
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/widgets"
    ports:
      - "8000:8000"
    depends_on:
      - db
